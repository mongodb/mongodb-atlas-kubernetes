paths:
  /resources:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
components:
  schemas:
    Resource:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        size:
          type: integer
        url:
          type: string
        target:
          type: string
