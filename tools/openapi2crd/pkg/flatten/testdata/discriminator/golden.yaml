paths:
  /animals:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
components:
  schemas:
    Animal:
      type: object
      properties:
        animalType:
          type: string
        name:
          type: string
        indoor:
          type: boolean
        breed:
          type: string
      x-xgen-discriminator:
        propertyName: animalType
        mapping:
          cat:
            properties:
              - indoor
          dog:
            properties:
              - breed
