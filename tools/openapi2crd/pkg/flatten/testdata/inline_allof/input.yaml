paths:
  /items:
    get:
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
components:
  schemas:
    Item:
      type: object
      properties:
        metadata:
          allOf:
            - type: object
              description: Base metadata
              properties:
                id:
                  type: string
                createdAt:
                  type: string
              required:
                - id
            - type: object
              properties:
                updatedAt:
                  type: string
                version:
                  type: integer
              required:
                - version
